name: Build and Deploy to Tomcat 9

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, dev]
    env:
      WAR_NAME: "ROOT.war"
      TOMCAT_WEBAPPS: "/var/lib/tomcat9/webapps"

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Make build.sh executable
        run: sudo chmod +x build.sh

      - name: Remove existing WAR file
        run: sudo rm -rf ROOT.war

      - name: Install OpenJDK 8
        run: |
          sudo apt update
          sudo apt install -y openjdk-8-jdk

      - name: Build WAR using build.sh
        run: ./build.sh

      - name: Install OpenJDK 11
        run: sudo apt install -y openjdk-11-jdk

      - name: Install Tomcat 9
        run: |
          sudo apt install -y tomcat9 tomcat9-admin

      - name: Restart Tomcat 9
        run: sudo systemctl restart tomcat9

      - name: Deploy WAR to Tomcat
        run: |
          sudo rm -rf "$TOMCAT_WEBAPPS"/*
          sudo cp "$WAR_NAME" "$TOMCAT_WEBAPPS"
          sudo systemctl restart tomcat9
